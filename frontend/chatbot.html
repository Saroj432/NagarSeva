<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NagarSeva AI Chatbot</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .chat-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    width: 58px; height: 58px; border-radius: 50%;
    background: #0a3d22; color: #fff; border: none;
    font-size: 1.6rem; cursor: pointer;
    box-shadow: 0 4px 20px rgba(10,61,34,0.4);
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .chat-fab:hover { background: #1a6b3c; transform: scale(1.1); }
  .chat-window {
    position: fixed; bottom: 96px; right: 24px; z-index: 9998;
    width: 360px; height: 520px;
    background: #fff; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
    border: 1px solid rgba(10,61,34,0.1);
    transition: all 0.3s;
  }
  .chat-window.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
  .chat-header {
    background: #0a3d22; color: #fff;
    padding: 14px 18px; border-radius: 16px 16px 0 0;
    display: flex; align-items: center; gap: 10px;
  }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .chat-header-info h4 { font-size: 14px; margin: 0; font-weight: 600; }
  .chat-header-info p { font-size: 11px; opacity: 0.7; margin: 2px 0 0; }
  .online-dot {
    width: 8px; height: 8px; background: #00e676;
    border-radius: 50%; margin-left: auto;
    animation: pulse 2s infinite;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f8faf8;
  }
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    max-width: 75%; padding: 10px 14px;
    border-radius: 16px; font-size: 13px; line-height: 1.5;
  }
  .msg.bot .msg-bubble {
    background: #fff; color: #333;
    border: 1px solid #e8f5e9; border-radius: 4px 16px 16px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .msg.user .msg-bubble {
    background: #0a3d22; color: #fff;
    border-radius: 16px 4px 16px 16px;
  }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; flex-shrink: 0;
  }
  .msg.bot .msg-avatar { background: #e8f5e9; }
  .msg.user .msg-avatar { background: #0a3d22; color: #fff; }
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 10px 14px; background: #fff;
    border: 1px solid #e8f5e9; border-radius: 4px 16px 16px 16px;
    width: fit-content; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .typing span {
    width: 7px; height: 7px; background: #0a3d22;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .chat-input-area {
    padding: 12px; border-top: 1px solid #eee;
    display: flex; gap: 8px; background: #fff;
    border-radius: 0 0 16px 16px;
  }
  .chat-input {
    flex: 1; border: 1.5px solid #e0e0e0; border-radius: 100px;
    padding: 9px 14px; font-size: 13px; outline: none;
    font-family: inherit; resize: none;
  }
  .chat-input:focus { border-color: #0a3d22; }
  .send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: #0a3d22; color: #fff; border: none;
    cursor: pointer; font-size: 1rem; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { background: #1a6b3c; }
  .quick-btns {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .quick-btn {
    background: #f0fdf4; border: 1px solid #a5d6a7;
    color: #2e7d32; padding: 5px 12px; border-radius: 100px;
    font-size: 12px; cursor: pointer; font-family: inherit;
    transition: all 0.2s; white-space: nowrap;
  }
  .quick-btn:hover { background: #0a3d22; color: #fff; border-color: #0a3d22; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @media(max-width:480px) {
    .chat-window { width: calc(100vw - 32px); right: 16px; }
  }
</style>
</head>
<body>

<!-- Chat FAB Button -->
<button class="chat-fab" onclick="toggleChat()" id="chat-fab" title="AI Assistant">🤖</button>

<!-- Chat Window -->
<div class="chat-window hidden" id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">🤖</div>
    <div class="chat-header-info">
      <h4>NagarSeva Assistant</h4>
      <p>AI Powered Help</p>
    </div>
    <div class="online-dot"></div>
    <button onclick="toggleChat()" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.2rem;cursor:pointer;margin-left:8px">×</button>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <input class="chat-input" id="chat-input" placeholder="Message likhein..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="js/main.js"></script>
<script>
const API_URL = 'http://localhost:5000/api';
let chatOpen = false;
let chatHistory = [];
let isTyping = false;

const SYSTEM_PROMPT = `You are NagarSeva AI Assistant, a helpful municipal complaint system assistant for India.
You help citizens with:
1. Submitting complaints (garbage, drainage, road, water, electricity, sewage)
2. Checking complaint status
3. Understanding priority levels (critical, high, medium, low)
4. General municipal queries

Rules:
- Always respond in the same language as the user (Hindi, Hinglish, or English)
- Be helpful, friendly and concise
- For complaint status, tell them to check "My Complaints" section
- Keep responses short (2-3 sentences max)
- Use emojis to be friendly
- If asked about specific complaint, ask for reference ID`;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-window').classList.toggle('hidden', !chatOpen);
  document.getElementById('chat-fab').textContent = chatOpen ? '×' : '🤖';
  if (chatOpen && chatHistory.length === 0) {
    setTimeout(() => sendWelcome(), 300);
  }
}

function sendWelcome() {
  const user = getUser();
  const name = user?.name?.split(' ')[0] || 'ji';
  addBotMessage(`Namaste ${name}! 🙏 Main NagarSeva AI Assistant hoon.\n\nMain aapki kaise madad kar sakta hoon?`, true);
}

function addUserMessage(text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotMessage(text, showQuickBtns = false) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg bot';

  const formattedText = text.replace(/\n/g, '<br>');
  const quickBtns = showQuickBtns ? `
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickSend('Meri complaints ka status kya hai?')">📋 My Complaints</button>
      <button class="quick-btn" onclick="quickSend('Complaint kaise submit karein?')">➕ Submit Complaint</button>
      <button class="quick-btn" onclick="quickSend('Priority levels kya hote hain?')">⚡ Priority Info</button>
      <button class="quick-btn" onclick="quickSend('Contact number kya hai?')">📞 Contact</button>
    </div>` : '';

  div.innerHTML = `<div class="msg-avatar">🤖</div><div><div class="msg-bubble">${formattedText}</div>${quickBtns}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  addUserMessage(text);
  isTyping = true;
  showTyping();

  chatHistory.push({ role: 'user', content: text });

  try {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;

    const res = await fetch(`${API_URL}/chatbot/message`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ message: text, history: chatHistory.slice(-6) })
    });

    const data = await res.json();
    hideTyping();

    if (data.reply) {
      addBotMessage(data.reply);
      chatHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addBotMessage('Maafi chahta hoon, kuch technical problem hai. Thodi der baad try karein. 🙏');
    }
  } catch (err) {
    hideTyping();
    addBotMessage('Internet connection check karein aur dobara try karein. 🙏');
  }
  isTyping = false;
}
</script>
</body>
</html>
