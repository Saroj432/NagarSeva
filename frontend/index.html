<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NagarSeva — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2.5rem;">🏛️</div>
      <h1>NagarSeva</h1>
      <p>AI-Powered Municipal Complaint Portal</p>
    </div>

    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert-box"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
        <div style="text-align:right;margin-top:6px">
          <a href="#" onclick="showForgotPassword()" style="font-size:13px;color:var(--primary);text-decoration:none">Forgot Password?</a>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Your email" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="reg-phone" placeholder="Mobile number">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="reg-address" placeholder="Your address">
      </div>
      <div class="form-group">
        <label>Register As</label>
        <select id="reg-role">
          <option value="user">Citizen</option>
          <option value="worker">Field Worker</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Create password (min 6 chars)" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create Account</button>
    </form>

    <!-- FORGOT PASSWORD FORM -->
    <form id="forgot-form" class="hidden" onsubmit="handleForgotPassword(event)">
      <div style="margin-bottom:1.25rem">
        <h3 style="font-size:1rem;color:var(--primary-dark);margin-bottom:4px">Password Reset</h3>
        <p style="font-size:13px;color:var(--text-muted)">Enter your registered email — OTP will be sent</p>
      </div>
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" id="forgot-email" placeholder="Enter your registered email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="otp-send-btn">📧 Send OTP</button>
      <p style="text-align:center;margin-top:1rem;font-size:13px">
        <a href="#" onclick="switchTab('login')" style="color:var(--primary);text-decoration:none">← Login Again</a>
      </p>
    </form>

    <!-- OTP VERIFY FORM -->
    <form id="otp-form" class="hidden" onsubmit="handleResetPassword(event)">
      <div style="margin-bottom:1.25rem">
        <h3 style="font-size:1rem;color:var(--primary-dark);margin-bottom:4px">OTP Verify</h3>
        <p style="font-size:13px;color:var(--text-muted)">Enter the 6-digit OTP sent to your email.</p>
      </div>
      <div class="form-group">
        <label>OTP Code</label>
        <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6" required style="letter-spacing:0.3em;font-size:1.2rem;text-align:center">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password (min 6 chars)" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="reset-btn">🔐 Password Reset</button>
      <p style="text-align:center;margin-top:1rem;font-size:13px">
        <a href="#" onclick="showForgotPassword()" style="color:var(--primary);text-decoration:none">← Resend OTP</a>
      </p>
    </form>

    <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);text-align:center;">
      Admin? Contact your municipal office for admin credentials.
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  const user = getUser();
  if (user && getToken()) {
    if (user.role === 'admin') window.location.href = '/admin-dashboard.html';
    else if (user.role === 'worker') window.location.href = '/worker-dashboard.html';
    else window.location.href = '/user-dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    const tabs = document.querySelectorAll('.auth-tab');
    if (tab === 'login') tabs[0].classList.add('active');
    else if (tab === 'register') tabs[1].classList.add('active');
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
    document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    document.getElementById('forgot-form').classList.add('hidden');
    document.getElementById('otp-form').classList.add('hidden');
    document.getElementById('auth-tabs').classList.remove('hidden');
    document.getElementById('alert-box').innerHTML = '';
  }

  function showForgotPassword() {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.add('hidden');
    document.getElementById('otp-form').classList.add('hidden');
    document.getElementById('forgot-form').classList.remove('hidden');
    document.getElementById('auth-tabs').classList.add('hidden');
    document.getElementById('alert-box').innerHTML = '';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.textContent = 'Logging in...';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      setAuth(data.token, data.user);
      showAlert('alert-box', 'Login successful! Redirecting...', 'success');
      setTimeout(() => {
        if (data.user.role === 'admin') window.location.href = '/admin-dashboard.html';
        else if (data.user.role === 'worker') window.location.href = '/worker-dashboard.html';
        else window.location.href = '/user-dashboard.html';
      }, 800);
    } catch (err) {
      showAlert('alert-box', err.message, 'error');
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.textContent = 'Creating account...';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          phone: document.getElementById('reg-phone').value,
          address: document.getElementById('reg-address').value,
          role: document.getElementById('reg-role').value
        })
      });
      setAuth(data.token, data.user);
      showAlert('alert-box', 'Account created! Redirecting...', 'success');
      setTimeout(() => {
        if (data.user.role === 'worker') window.location.href = '/worker-dashboard.html';
        else window.location.href = '/user-dashboard.html';
      }, 800);
    } catch (err) {
      showAlert('alert-box', err.message, 'error');
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }

  async function handleForgotPassword(e) {
    e.preventDefault();
    const btn = document.getElementById('otp-send-btn');
    btn.textContent = 'I am sending it...';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email: document.getElementById('forgot-email').value })
      });
      showAlert('alert-box', '✅ ' + data.message, 'success');
      document.getElementById('forgot-form').classList.add('hidden');
      document.getElementById('otp-form').classList.remove('hidden');
    } catch (err) {
      showAlert('alert-box', err.message, 'error');
      btn.textContent = '📧 Send OTP';
      btn.disabled = false;
    }
  }

  async function handleResetPassword(e) {
    e.preventDefault();
    const newPass = document.getElementById('new-password').value;
    const confirmPass = document.getElementById('confirm-password').value;
    if (newPass !== confirmPass) {
      showAlert('alert-box', 'Both passwords do not match!', 'error');
      return;
    }
    const btn = document.getElementById('reset-btn');
    btn.textContent = 'Reset has been initiated...';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('forgot-email').value,
          otp: document.getElementById('otp-input').value,
          newPassword: newPass
        })
      });
      showAlert('alert-box', '✅ ' + data.message, 'success');
      setTimeout(() => switchTab('login'), 2000);
    } catch (err) {
      showAlert('alert-box', err.message, 'error');
      btn.textContent = '🔐 Password Reset Karo';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
